<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Doctype</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="brand-circle">D</div>
                <div>
                    <h1>Doc.type</h1>
                    <p>Criar nova conta</p>
                </div>
            </div>
            <form id="registerForm" class="auth-form">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>

                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>

                <label for="confirmSenha">Confirmar Senha</label>
                <input type="password" id="confirmSenha" name="confirmSenha" placeholder="Digite novamente a senha" required>

                <button type="submit" class="primary-button">Registrar</button>
            </form>
            <p class="auth-footer">Já tem conta? <a href="index.html">Login</a></p>
            <div id="message" class="auth-message"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Documento - Doctype</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-wrapper">
        <aside class="sidebar">
            <div class="brand">Doc.type</div>
            <nav>
                <a href="perfil.html">Perfil Usuário</a>
                <a href="usuario.html">Cadastro de Usuário</a>
                <a href="cadastrar-documento.html" class="active">Cadastrar Documentos</a>
                <a href="consulta-documento.html">Entrada de Documentos</a>
                <a href="relatorios.html">Relatórios</a>
            </nav>
        </aside>
        <main class="content">
            <header class="page-header">
                <h1>Cadastrar Documento</h1>
            </header>
            <section class="card form-card">
                <label>
                    Nome do Documento
                    <input type="text" placeholder="Ex: Contrato">
                </label>
                <label>
                    Descrição
                    <textarea rows="4" placeholder="Descreva o documento..."></textarea>
                </label>
                <label class="file-upload">
                    <span>Carregar Documento</span>
                    <input type="file">
                </label>
                <div class="actions right-align">
                    <button class="primary-button" type="button">Salvar</button>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
